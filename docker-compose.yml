# ─────────────────────────────────────────────────────────────────────────────
#  Atelier Vitrine — app container + Cloudflare tunnel.
#
#  • web         : Next.js standalone server on port 3010.
#  • cloudflared : exposes the app publicly through a Cloudflare tunnel.
#
#  Tunnel mode is chosen automatically from .env:
#    • TUNNEL_TOKEN set  → NAMED tunnel  → STABLE custom domain, survives restarts.
#    • TUNNEL_TOKEN empty → QUICK tunnel → ephemeral trycloudflare.com URL (random).
#  To pin the domain: create a named tunnel in the Cloudflare Zero Trust dashboard,
#  copy its token into TUNNEL_TOKEN=... in .env, then redeploy. Nothing else to change.
# ─────────────────────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* inlinées au build pour les composants client (cf. lib/site.ts)
        NEXT_PUBLIC_SITE_URL:          ${NEXT_PUBLIC_SITE_URL:-https://atelier-vitrine.fr}
        NEXT_PUBLIC_SITE_EMAIL_DOMAIN: ${NEXT_PUBLIC_SITE_EMAIL_DOMAIN:-}
    image: atelier-vitrine:latest
    container_name: atelier-vitrine
    restart: unless-stopped
    expose:
      - "3010"
    # Bound to loopback only: public access goes through the tunnel, not the host.
    ports:
      - "127.0.0.1:3010:3010"
    # Secrets serveur au runtime (clé Google Places, service_role Supabase, etc.).
    # Le standalone Next ne lit pas .env tout seul : on injecte les variables ici.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3010
      - HOSTNAME=0.0.0.0
    # Flags lus au RUNTIME par l'app (cf. lib/runtime-config.ts). Monté en
    # lecture seule par-dessus le /config.json baké dans l'image : éditer le
    # fichier hôte + rafraîchir le navigateur suffit (ni rebuild ni restart).
    volumes:
      - ./config.json:/app/public/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3010/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: atelier-vitrine-tunnel
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    environment:
      # Empty by default → quick tunnel. Set TUNNEL_TOKEN in .env → named tunnel.
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    # The run args switch automatically:
    #   • TUNNEL_TOKEN set in .env  → CLOUDFLARED_RUN_ARGS defaults to "run"
    #     (named tunnel: cloudflared reads TUNNEL_TOKEN from the env above).
    #   • TUNNEL_TOKEN empty         → falls back to a quick tunnel to web:3010.
    command: tunnel --no-autoupdate ${CLOUDFLARED_RUN_ARGS:---url http://web:3010}
