# ─────────────────────────────────────────────────────────────────────────────
#  Atelier Vitrine — app container + Cloudflare tunnel.
#
#  • web         : Next.js standalone server on port 3010.
#  • cloudflared : exposes the app publicly through a Cloudflare tunnel.
#
#  Default tunnel is a *quick tunnel* (ephemeral https://<name>.trycloudflare.com
#  URL, printed in the cloudflared logs) — matching the project's existing
#  launch_cloudflared_https workflow. For a stable custom domain, switch to a
#  named tunnel: see the commented block under the cloudflared service.
# ─────────────────────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: atelier-vitrine:latest
    container_name: atelier-vitrine
    restart: unless-stopped
    expose:
      - "3010"
    # Bound to loopback only: public access goes through the tunnel, not the host.
    ports:
      - "127.0.0.1:3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3010/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: atelier-vitrine-tunnel
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    # Quick tunnel (ephemeral URL printed in logs: docker compose logs cloudflared)
    command: tunnel --no-autoupdate --url http://web:3010

    # ── Named tunnel (stable custom domain) ──────────────────────────────────
    # 1. Create a tunnel in the Cloudflare dashboard, copy its token.
    # 2. Put TUNNEL_TOKEN=... in .env (gitignored).
    # 3. Replace the command above with the line below and uncomment env.
    # command: tunnel --no-autoupdate run
    # environment:
    #   - TUNNEL_TOKEN=${TUNNEL_TOKEN}
